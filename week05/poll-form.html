<!DOCTYPE html>
<html lang="en-US"> 
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>WDD130 | HTML Form - User Poll</title>
        <link href="styles/poll-form.css" rel="stylesheet">
    </head>
    <body>
        <header>
            <h1>WDD 130 | Mynor Aguirre | HTML Form - User Poll</h1>
        </header>
        <main>
            <form>
                <fieldset>
                    <legend>Contact Information</legend>
                    <div class="form-item">
                        <label for="fullname">Full Name: </label>
                        <input type="text" id="fullname" name="fullname"/>
                    </div>
                    <div class="form-item column2">
                        <label for="email">Email Address: </label>
                        <input type="email" id="usermail" name="usermail"/>
                    </div>    
               </fieldset>
                <fieldset>
                    <legend>Questions</legend>
                    <div class="column1">
                    <label for="browser">What is your favorite browser?</label>
                        <select id="browser" name="browser">
                            <option value="chrome">Chrome</option>
                            <option value="safari">Safari</option>
                            <option value="firefox">Firefox</option>
                            <option value="edge">Edge</option>
                            <option value="opera">Opera</option>
                        </select>
                    </div>
                    <div class="column1">
                        <label for="pet">Do you have a household pet?</label>
                        <input type="checkbox" id="pet" name="pet">
                    </div>
                    <div class="column1">
                        <label for="feedback">List the places you have lived: </label>
                        <textarea id="feedback" name="feedback" rows="4" placeholder="Guatemala, Nicaragua, Honduras, El salvador"></textarea>
                    </div>    
                </fieldset>
                <div class="column1">
                <button type="submit">Submit poll</button>
                </div>    
            </form>
        </main>
        <footer>
            ©2024 | HTML Form - User Poll Activity | Mynor Aguirre
        </footer>
    </body>
</html>
